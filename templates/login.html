{% extends "base.html" %}

{% block title %}Login - HormoneAI{% endblock %}

{% block content %}
<div class="auth-page-shell">
  <div class="auth-card">
    <h2>Sign in</h2>
    <p>Access your HormoneAI wellness dashboard.</p>
    <form method="POST" class="auth-form">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="Password" required />
      <button class="button button-gradient" type="submit">Sign in</button>
    </form>
    <p class="auth-note">New here? <a href="{{ url_for('home', tab='register') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
